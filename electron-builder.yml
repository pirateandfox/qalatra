appId: com.justinhandley.qalatra
productName: Qalatra
copyright: Copyright © 2026 Justin Handley

asar: false

directories:
  output: dist
  buildResources: assets

files:
  - electron-main.js
  - ipc-handlers.js
  - db-worker.js
  - preload.cjs
  - s3.js
  - mcp/**/*
  - ui/dist/**/*
  - "!ui/src/**/*"
  - "!ui/node_modules/**/*"
  - "!db/**/*"
  - "!node_modules/.cache/**/*"
  - "!**/*.map"
  - "!**/*.md"
  - "!assets/build-icon.mjs"


mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

dmg:
  title: Qalatra
  sign: false

win:
  target:
    - target: nsis
      arch:
        - x64

linux:
  category: Utility
  target:
    - target: AppImage
      arch:
        - x64
        - arm64

publish:
  provider: github
  owner: pirateandfox
  repo: qalatra
  releaseType: release

afterSign: scripts/notarize.mjs
